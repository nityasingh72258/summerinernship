<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variable</title>
</head>
<body>
    <script>
        //let variable
        let a=7
        console.log(a);
        {
            let b=10
        }
        console.log(b);//it is not possible
        //var variable
        {
         var b=7
        }
        console.log(b);//it will give output 10,we can access var variable outside the block
        
        //const variable
        const name="nitya"

        console.log(name);//nitya
        
        name="nitya singh"
        console.log(name);//error
    </script>
</body>
</html>
