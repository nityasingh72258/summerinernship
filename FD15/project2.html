<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background changing</title>
</head>
<body>
    <div style="display:flex; justify-content:center;height:100vh;align-items:center;">
        <button style="padding:20px;" onclick="change()">change color </button>
    </div>
    <script>
        let color=["red","orange","blue","green","yellow","pink","sky blue","light blue"]
        function change(){
            let body=document.body
            let random=Math.floor(Math.random()*(color.length))
            body.style.backgroundColor=color[random]
        }
    </script>
    
</body>
</html>
